kind = "web"
previewPath = "/"
title = "AI Agent 3D Viewer"
version = "1.0.0"
id = "artifacts/3d-agent-viewer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19961

[services.development]
run = "pnpm --filter @workspace/3d-agent-viewer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/3d-agent-viewer", "run", "build" ]
publicDir = "artifacts/3d-agent-viewer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19961"
BASE_PATH = "/"
